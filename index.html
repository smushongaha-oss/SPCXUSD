<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPCX/USD · Groq AI Signal · FOCUS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#060a10;--panel:#090d1c;--border:#14223a;
    --green:#00e5b0;--red:#ff2d55;--gold:#f5c518;--blue:#3d9bff;--purple:#aa44ff;
    --text:#d8eaff;--dim:#3d5a7a;
    --glow-green:0 0 14px #00e5b0bb;--glow-red:0 0 14px #ff2d55bb;
    --glow-blue:0 0 14px #3d9bffbb;--glow-purple:0 0 14px #aa44ffbb;
  }
  body{
    background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px;
    background-image:radial-gradient(ellipse at 50% 0%,#1e90ff06 0%,transparent 65%)
  }

  .header{text-align:center;margin-bottom:20px}
  .title{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;color:var(--blue);text-shadow:0 0 14px #3d9bffbb;margin-bottom:5px}
  .subtitle{font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--dim);letter-spacing:0.15em}

  .setup-panel{
    width:100%;max-width:800px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:15px;margin-bottom:15px
  }
  .setup-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .setup-input{
    flex:1;min-width:150px;background:#04070e;border:1px solid var(--border);
    border-radius:5px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:0.85rem;
    padding:10px;outline:none;transition:border-color 0.2s
  }
  .setup-input:focus{border-color:var(--blue)}
  .btn{
    padding:10px 20px;border:none;border-radius:5px;font-family:'Orbitron',sans-serif;
    font-size:0.8rem;font-weight:700;cursor:pointer;transition:opacity 0.2s
  }
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:hover{opacity:0.85}
  .btn-secondary{background:var(--purple);color:#fff}

  .main-signal{
    width:100%;max-width:800px;background:var(--panel);border:2px solid var(--border);
    border-radius:12px;padding:20px;margin-bottom:15px;text-align:center
  }
  .signal-strength{
    font-family:'Orbitron',sans-serif;font-size:3rem;font-weight:900;
    margin:15px 0;text-shadow:0 0 20px #3d9bffbb
  }
  .signal-strength.buy{color:var(--green);text-shadow:0 0 20px #00e5b0bb}
  .signal-strength.sell{color:var(--red);text-shadow:0 0 20px #ff2d55bb}
  .signal-strength.wait{color:var(--blue)}

  .price-row{
    display:flex;gap:20px;justify-content:center;margin:15px 0;flex-wrap:wrap
  }
  .price-item{display:flex;flex-direction:column;gap:3px;text-align:center}
  .price-label{font-size:0.7rem;color:var(--dim);letter-spacing:0.1em}
  .price-value{font-family:'Share Tech Mono',monospace;font-size:1.2rem;color:var(--blue)}

  .ai-analysis{
    width:100%;max-width:800px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;overflow:hidden;margin-bottom:15px
  }
  .ai-header{
    background:#090c1e;border-bottom:1px solid var(--border);padding:10px 15px;
    display:flex;align-items:center;gap:10px
  }
  .ai-header-title{font-family:'Orbitron',sans-serif;font-size:0.85rem;color:var(--blue);letter-spacing:0.1em}
  .ai-status{font-size:0.7rem;color:var(--dim);margin-left:auto}
  .ai-content{padding:15px;min-height:150px;font-size:0.95rem;line-height:1.7;white-space:pre-wrap}
  .ai-content.loading{color:var(--dim);font-style:italic}
  .ai-content.error{color:var(--red)}

  .controls{width:100%;max-width:800px;display:flex;gap:10px}
  .controls button{flex:1}

  .live-feed{
    width:100%;max-width:800px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:12px;margin-bottom:15px;font-family:'Share Tech Mono',monospace;
    font-size:0.75rem;color:var(--dim);max-height:200px;overflow-y:auto
  }
  .feed-line{padding:3px 0;border-bottom:1px solid #14223a22}
  .feed-line.buy{color:var(--green)}
  .feed-line.sell{color:var(--red)}
  .feed-line.info{color:var(--blue)}

  @media(max-width:600px){
    .title{font-size:1.5rem}
    .main-signal{padding:15px}
    .signal-strength{font-size:2rem}
    .price-row{gap:10px}
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">⚡ GROQ AI SIGNAL</div>
  <div class="subtitle">SPCX/USD · H1+H4 CONFLUENCE · LIVE DATA</div>
</div>

<!-- API CONFIG -->
<div class="setup-panel">
  <div class="setup-row">
    <input class="setup-input" id="groqKey" type="password" placeholder="Groq API Key (gsk_...)" style="flex:1.2">
    <input class="setup-input" id="binanceSymbol" type="text" value="SPXUSD" placeholder="Symbol" style="flex:0.8">
    <button class="btn btn-primary" onclick="initFeed()">▶ START LIVE</button>
  </div>
  <div style="font-size:0.7rem;color:var(--dim)">Using: Binance 1h/4h candles + Groq llama-3.3-70b</div>
</div>

<!-- MAIN SIGNAL -->
<div class="main-signal">
  <div style="font-size:0.85rem;color:var(--dim);letter-spacing:0.1em">CONFLUENCE SIGNAL</div>
  <div class="signal-strength wait" id="mainSignal">WAIT ◆</div>
  <div class="price-row">
    <div class="price-item">
      <div class="price-label">PRICE</div>
      <div class="price-value" id="curPrice">$--</div>
    </div>
    <div class="price-item">
      <div class="price-label">STRENGTH</div>
      <div class="price-value" id="sigStrength">--</div>
    </div>
    <div class="price-item">
      <div class="price-label">H1 BIAS</div>
      <div class="price-value" id="h1Bias">--</div>
    </div>
    <div class="price-item">
      <div class="price-label">H4 BIAS</div>
      <div class="price-value" id="h4Bias">--</div>
    </div>
  </div>
</div>

<!-- AI ANALYSIS -->
<div class="ai-analysis">
  <div class="ai-header">
    <span style="font-size:1.2rem">🤖</span>
    <div class="ai-header-title">GROQ AI CONFLUENCE ANALYSIS</div>
    <div class="ai-status" id="aiStatus">Ready</div>
  </div>
  <div class="ai-content" id="aiContent">Waiting for live data and Groq analysis...</div>
</div>

<!-- LIVE FEED -->
<div class="live-feed" id="liveFeed">
  <div class="feed-line info">[SYSTEM] Dashboard initialized</div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn btn-primary" onclick="runAnalysis()">⚡ ANALYZE NOW</button>
  <button class="btn btn-secondary" onclick="clearFeed()">CLEAR FEED</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script>
(function(){

  const el = id => document.getElementById(id);
  const set = (id, v) => { const e = el(id); if(e) e.textContent = v; };
  const fmt = (v, d=2) => (v == null || isNaN(v)) ? '--' : parseFloat(v).toFixed(d);

  let dataH1 = [], dataH4 = [];
  let lastPrice = null, sigH1 = 'WAIT', sigH4 = 'WAIT', confSig = 'WAIT';
  let pollTimer = null;

  function log(msg, type='info'){
    const feed = el('liveFeed');
    const line = document.createElement('div');
    line.className = `feed-line ${type}`;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    feed.appendChild(line);
    feed.scrollTop = feed.scrollHeight;
    if(feed.children.length > 50) feed.removeChild(feed.firstChild);
  }

  function calcEMA(data, period){
    if(!data || data.length < period) return null;
    const k = 2 / (period + 1);
    let ema = data.slice(0, period).reduce((a,b)=>a+b,0) / period;
    for(let i = period; i < data.length; i++) ema = data[i]*k + ema*(1-k);
    return ema;
  }

  function calcRSI(data, period=14){
    if(!data || data.length < period+1) return null;
    const changes = [];
    for(let i=1; i<data.length; i++) changes.push(data[i]-data[i-1]);
    const gains = changes.slice(-period).filter(c=>c>0).reduce((a,b)=>a+b,0)/period;
    const losses = Math.abs(changes.slice(-period).filter(c=>c<0).reduce((a,b)=>a+b,0)/period);
    return losses === 0 ? 100 : 100 - (100/(1+gains/losses));
  }

  function calcMACD(data){
    const ema12 = calcEMA(data, 12);
    const ema26 = calcEMA(data, 26);
    return (ema12 && ema26) ? ema12 - ema26 : null;
  }

  async function fetchBinance(symbol, interval='1h'){
    try{
      const limit = interval === '1h' ? 100 : 96;
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if(!Array.isArray(data)) throw new Error('Invalid response');
      return data.map(k => ({
        open: parseFloat(k[1]),
        high: parseFloat(k[2]),
        low: parseFloat(k[3]),
        close: parseFloat(k[4]),
        time: k[0]
      }));
    }catch(e){
      log(`Binance error (${interval}): ${e.message}`, 'error');
      throw e;
    }
  }

  async function updateData(){
    try{
      const symbol = el('binanceSymbol').value || 'SPXUSD';
      [dataH1, dataH4] = await Promise.all([
        fetchBinance(symbol, '1h'),
        fetchBinance(symbol, '4h')
      ]);

      if(!dataH1.length || !dataH4.length) throw new Error('No candle data');

      lastPrice = dataH1[dataH1.length-1].close;
      set('curPrice', '$' + fmt(lastPrice, 2));

      const h1closes = dataH1.map(c=>c.close);
      const h4closes = dataH4.map(c=>c.close);

      const h1ema9 = calcEMA(h1closes, 9);
      const h1ema21 = calcEMA(h1closes, 21);
      const h1rsi = calcRSI(h1closes, 14);

      const h4ema9 = calcEMA(h4closes, 9);
      const h4ema21 = calcEMA(h4closes, 21);
      const h4rsi = calcRSI(h4closes, 14);

      sigH1 = (h1ema9 > h1ema21 && h1rsi > 40 && h1rsi < 75) ? 'BUY' : 
              (h1ema9 < h1ema21 && h1rsi < 60 && h1rsi > 25) ? 'SELL' : 'WAIT';

      sigH4 = (h4ema9 > h4ema21 && h4rsi > 40 && h4rsi < 75) ? 'BUY' : 
              (h4ema9 < h4ema21 && h4rsi < 60 && h4rsi > 25) ? 'SELL' : 'WAIT';

      set('h1Bias', sigH1);
      set('h4Bias', sigH4);

      if(sigH1 === 'BUY' && sigH4 === 'BUY') confSig = 'BUY';
      else if(sigH1 === 'SELL' && sigH4 === 'SELL') confSig = 'SELL';
      else confSig = 'WAIT';

      updateSignalDisplay();
      log(`Data: H1=${sigH1} H4=${sigH4} Price=${fmt(lastPrice,2)}`, 'info');

    }catch(e){
      log(`Update failed: ${e.message}`, 'error');
    }
  }

  function updateSignalDisplay(){
    const sig = el('mainSignal');
    const strength = el('sigStrength');
    sig.textContent = confSig === 'BUY' ? '🟢 BUY' : confSig === 'SELL' ? '🔴 SELL' : '⚪ WAIT';
    sig.className = `signal-strength ${confSig.toLowerCase()}`;
    strength.textContent = confSig === 'WAIT' ? '--' : '100%';
  }

  async function runAnalysis(){
    const key = el('groqKey').value.trim();
    if(!key){ log('Enter Groq API key', 'error'); return; }
    if(!dataH1.length){ log('No data yet', 'error'); return; }

    const aiContent = el('aiContent');
    const aiStatus = el('aiStatus');
    aiContent.className = 'ai-content loading';
    aiContent.textContent = '⚡ Analyzing with Groq AI...';
    aiStatus.textContent = 'Analyzing...';

    try{
      const h1closes = dataH1.map(c=>c.close);
      const h4closes = dataH4.map(c=>c.close);

      const prompt = `Analyze SPCX/USD confluence signal.
Price: $${fmt(lastPrice,2)}
H1: EMA9=${fmt(calcEMA(h1closes,9),2)}, EMA21=${fmt(calcEMA(h1closes,21),2)}, RSI=${fmt(calcRSI(h1closes),1)}, Signal=${sigH1}
H4: EMA9=${fmt(calcEMA(h4closes,9),2)}, EMA21=${fmt(calcEMA(h4closes,21),2)}, RSI=${fmt(calcRSI(h4closes),1)}, Signal=${sigH4}
Confluence: ${confSig}

Provide concise trading analysis and recommendation (3-4 sentences max). Focus on entry, stop loss, target.`;

      const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{role: 'user', content: prompt}],
          max_tokens: 400,
          temperature: 0.6
        })
      });

      const d = await resp.json();
      if(d.error) throw new Error(d.error.message);

      const analysis = d.choices?.[0]?.message?.content || 'No response';
      aiContent.textContent = analysis;
      aiContent.className = 'ai-content';
      aiStatus.textContent = 'Ready';
      log('Groq analysis complete', 'buy');

    }catch(e){
      aiContent.textContent = '❌ ' + e.message;
      aiContent.className = 'ai-content error';
      aiStatus.textContent = 'Error';
      log(`Groq error: ${e.message}`, 'error');
    }
  }
  window.runAnalysis = runAnalysis;

  function clearFeed(){
    el('liveFeed').innerHTML = '<div class="feed-line info">[SYSTEM] Feed cleared</div>';
  }
  window.clearFeed = clearFeed;

  async function initFeed(){
    const key = el('groqKey').value.trim();
    if(!key){ alert('Enter Groq API key'); return; }

    if(pollTimer) clearInterval(pollTimer);

    log('Connecting to Binance...', 'info');
    await updateData();
    await runAnalysis();

    pollTimer = setInterval(async () => {
      await updateData();
      await runAnalysis();
    }, 60000); // 1 min

    log('Live feed active - refreshing every 1m', 'buy');
  }
  window.initFeed = initFeed;

})();
</script>
</body>
</html>
